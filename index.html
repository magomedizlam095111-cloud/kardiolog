<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Кардиолог — Гакаев Биххан Русланович</title>

    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header>
        <div class="container">
            <h1>Гакаев Биххан Русланович</h1>
            <p>Кардиолог • Приём в городе Грозный • 12 июня</p>
        </div>
    </header>

    <main>
        <div class="container">
            <div class="card">

                <h2>Запись на приём</h2>

                <p><strong>Дата приёма:</strong> 12 июня</p>
                <p><strong>Город:</strong> Грозный</p>
                <p><strong>Специализация:</strong> Кардиолог</p>

                <p class="description">
                    Оставьте заявку для записи на консультацию
                    и получения дополнительной информации.
                </p>

                <form id="appointmentForm">

                    <input
                        type="text"
                        id="name"
                        placeholder="Ваше имя"
                        required
                    >

                    <input
                        type="tel"
                        id="phone"
                        placeholder="Номер телефона"
                        required
                    >

                    <textarea
                        id="message"
                        placeholder="Опишите ваш вопрос"
                    ></textarea>

                    <button type="submit">
                        Отправить заявку
                    </button>

                </form>

                <div id="aiResponse"></div>

            </div>
        </div>
    </main>

    <footer>
        <div class="container">
            <p>© 2026 Кардиологический приём</p>
        </div>
    </footer>

    <script src="main.js"></script>
</body>
</html>
